# PRIME — GPU conda environment (NVIDIA CUDA)
#
# Adds the VRAM-bounded GPU backend (prime.gpu.ensemble_mnn_correct) on top of
# the CPU runtime: RAPIDS cuvs for chunked approximate-NN (CAGRA) and cupy for
# the sparse random-projection matmul.
#
#   ⚠  This environment only solves on **Linux with an NVIDIA GPU + driver**.
#      It will NOT create on macOS / Windows / CPU-only machines — use
#      environment.yml there. mamba is strongly recommended (the RAPIDS solve
#      is heavy for classic conda).
#
#     git clone https://github.com/XinchaoWu99/PRIME.git
#     cd PRIME
#     # 1) set `cuda-version` below to match your driver (run `nvidia-smi`)
#     mamba env create -f environment-gpu.yml
#     conda activate prime-gpu
#     python -c "import prime.gpu; print(prime.gpu.detect())"
#     #   -> GPUEnv(cupy=True, cupy_sparse=True, cuvs=True, faiss_gpu=False)

name: prime-gpu

channels:
  - rapidsai
  - conda-forge
  - nvidia

dependencies:
  - python=3.12
  - cuda-version=12.5         # <-- match your NVIDIA driver/toolkit (e.g. 12.2 / 12.4 / 12.5)

  # ---- PRIME core runtime ----
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - scikit-learn>=1.3
  - anndata>=0.10
  - scanpy>=1.10
  - h5py>=3.0                # backed-mode .h5ad I/O for prime.pp streaming (also an anndata dep)
  - scikit-misc>=0.3         # required by prime_st's default hvg_flavor="seurat_v3" (scanpy HVG)

  # ---- GPU acceleration (NVIDIA only) ----
  - cupy>=13.0               # sparse random-projection matmul on the GPU
  - cuvs>=24.10              # RAPIDS CAGRA approximate-NN — the preferred kNN backend
  # Alternative / additional ANN backend (uncomment to use knn_backend="faiss"):
  # - faiss-gpu>=1.7

  # ---- optional extras ----
  - matplotlib>=3.7
  - joblib>=1.3

  # ---- pip-only deps + PRIME itself ----
  - pip>=23
  - pip:
      - plottable>=0.1.5
      # Plain editable install — the GPU libraries (cupy, cuvs) are provided by
      # conda above, so do NOT use the [gpu-cuvs]/[gpu-faiss] pip extras here
      # (they would pull duplicate PyPI wheels and can clash with the conda build).
      - -e .
